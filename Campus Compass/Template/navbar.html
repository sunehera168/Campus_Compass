{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Compass</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --dropdown-bg-opacity: 0.95; /* Adjust transparency (0-1) */
        }
        
        /* Full-height dropdown */
        .dropdown-menu-fullheight {
            background-color: rgba(34, 34, 34, var(--dropdown-bg-opacity)) !important;
            position: fixed !important;
            top: 56px !important;
            bottom: 0 !important;
            right: 0 !important;
            left: auto !important;
            width: 300px !important;
            border-radius: 0 !important;
            border: none !important;
            overflow-y: auto;
            transform: none !important;
            margin: 0 !important;
        }
        
        /* White dropdown items */
        .dropdown-menu-fullheight .dropdown-item {
            color: white !important;
            padding: 12px 20px;
        }
        
        .dropdown-menu-fullheight .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.1) !important;
        }
        
        .dropdown-menu-fullheight .dropdown-divider {
            border-color: rgba(255, 255, 255, 0.1) !important;
            margin: 8px 0;
        }
        
        /* Navbar styling */
        .navbar-custom {
            
            height: 56px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        /* Page content padding */
        body {
            padding-top: 56px;
        }
        
        /* Notification badge */
        .notification-badge {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #dc3545;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(25%, -25%);
        }
        
        /* Home button styling */
        .home-button {
            margin-right: 15px;
            font-size: 1rem;
            display: flex;
            align-items: center;
        }
        .home-button i {
            margin-right: 5px;
        }
        
        /* User icon styling */
        .user-icon {
            margin-right: 10px;
            font-size: 1.25rem;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
        <!-- Logo on left -->
        <a class="navbar-brand" href="http://127.0.0.1:8000/">
            <img src="{% static 'Images/logo1.png' %}" alt="Logo" height="100">
        </a>
        
        <!-- Right-aligned items -->
        <div class="d-flex align-items-center">
            <!-- Search Button and Collapsible Search Bar -->
            <div class="d-flex align-items-center me-3">  <!-- Added wrapper div with margin -->
                <button class="btn btn-outline-light" type="button" data-bs-toggle="collapse" data-bs-target="#searchBar" aria-expanded="false" aria-controls="searchBar">
                    <i class="bi bi-search"></i>
                </button>
                
                <!-- Collapsible Search Bar -->
                <div class="collapse" id="searchBar">
                    <div class="d-flex ms-2">  <!-- Added inner flex container with left margin -->
                        <input class="form-control" type="search" placeholder="Search..." aria-label="Search">
                        <button class="btn btn-outline-light ms-2" type="submit">Go</button>
                    </div>
                </div>
            </div>
            
            <!-- Home Button -->
            <a class="nav-link home-button" href="#" style="color: white;">
                <i class="bi bi-house-door"></i>Home
            </a>
            
            <!-- User Dropdown -->
            <div class="dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" 
                   data-bs-toggle="dropdown" aria-expanded="false"><i class="bi bi-person-circle user-icon"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-fullheight dropdown-menu-end" aria-labelledby="userDropdown">
                    <li><h6 class="dropdown-header text-white">Account</h6></li>
                    <li><a class="dropdown-item" href="#"><i class="bi bi-bell me-2"></i>Notifications</a></li>
                    <li><a class="dropdown-item" href="#"><i class="bi bi-key me-2"></i>Change Password</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><h6 class="dropdown-header text-white">Preferences</h6></li>
                    <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
                    <li><a class="dropdown-item" href="#"><i class="bi bi-question-circle me-2"></i>Help</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

    <!-- Page Content -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
